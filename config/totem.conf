CONFIG_ZMK_USB_LOGGING=n

# ──────────────────────────────────────────────────────────────
# TOTEM keyboard configuration
# ──────────────────────────────────────────────────────────────

# Enable ZMK mouse / pointer support (required for mouse buttons & movement)
CONFIG_ZMK_MOUSE=y

# Enable the HID trackball interface module
CONFIG_ZMK_HID_TRACKBALL_INTERFACE=y

# Bluetooth settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Optional: increase log level for debugging
# CONFIG_ZMK_LOG_LEVEL_DBG=y
